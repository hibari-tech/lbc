[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
confidence-threshold = 0.93
# Workspace crates use the proprietary LBC license, which is not a valid
# SPDX expression. Skip license checks for our own private packages.
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    # Mozilla CA root certificate set (via webpki-roots, pulled by hyper-rustls).
    # Permissive data-sharing licence — see https://cdla.dev/permissive-2-0/
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal `path = ...` deps without a version look like wildcards
# to cargo-deny. Allow them so we don't have to version-pin every internal crate.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"

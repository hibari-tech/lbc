name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: cargo build --release
        run: cargo build --workspace --release --locked --target ${{ matrix.target }}
      - name: collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          for bin in lbc-edge lbc-control-plane lbc; do
            src="target/${{ matrix.target }}/release/${bin}"
            [ -f "${src}.exe" ] && cp "${src}.exe" "dist/${bin}-${{ matrix.target }}.exe" || true
            [ -f "${src}" ] && cp "${src}" "dist/${bin}-${{ matrix.target }}" || true
          done
      - uses: actions/upload-artifact@v4
        with:
          name: lbc-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
# TODO: replace this scaffold with `cargo dist init` once we tag the first
# release. cargo-dist will generate signed installers (.msi, .deb, .rpm,
# .dmg) and a richer matrix per lbcspec.md §5.1 / §6.3. See TASKS.md §0.2.
